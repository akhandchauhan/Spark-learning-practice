version: '3'

services:

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-master.sh &&
      tail -f /dev/null
      "
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/data   # ✅ SAME PATH

  spark-worker-1:
    image: apache/spark:3.5.0
    container_name: spark-worker-1
    depends_on:
      - spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
      "
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 1
    ports:
      - "8081:8081"
    volumes:
      - ./:/data   # ✅ SAME PATH

  spark-worker-2:
    image: apache/spark:3.5.0
    container_name: spark-worker-2
    depends_on:
      - spark-master
    command: >
      bash -c "
      /opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
      tail -f /dev/null
      "
    environment:
      SPARK_WORKER_MEMORY: 1g
      SPARK_WORKER_CORES: 1
    ports:
      - "8082:8081"
    volumes:
      - ./:/data   # ✅ SAME PATH

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - JUPYTER_TOKEN=
    command: >
      start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
    volumes:
      - ./:/data   # ✅ SAME PATH